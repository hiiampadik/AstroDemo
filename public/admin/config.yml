backend:
  name: github
  repo: hiiampadik/AstroDemo
  branch: master
  base_url: https://decap-oauth.brona-musil.workers.dev
  auth_endpoint: /auth

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "subpages"
    label: "Subpages"
    folder: "src/content/subpages"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Subtitle", name: "subtitle", widget: "string" }
      - { label: "Graphic (SVG)", name: "graphic", widget: "file", file_extensions: ["svg"] }
      - { label: "Body Paragraph", name: "body", widget: "markdown" }
